<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>H90D 3D / AR Viewer V2</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root { --bg:#f4f4f2; --text:#111; --sub:#666; --line:#ddd; --btn:#111; --btn-text:#fff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); }
    header { padding:22px 20px 14px; background:#fff; border-bottom:1px solid var(--line); }
    h1 { margin:0 0 8px; font-size:24px; line-height:1.25; }
    p { margin:0; color:var(--sub); font-size:15px; line-height:1.55; }
    .wrap { max-width:860px; margin:0 auto; padding:18px 16px 28px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 8px 28px rgba(0,0,0,.06); }
    .action { padding:18px; display:grid; gap:10px; }
    button, a.button { display:block; width:100%; border:0; border-radius:12px; padding:15px 16px; font-size:16px; font-weight:700; text-align:center; text-decoration:none; cursor:pointer; }
    button.primary { background:var(--btn); color:var(--btn-text); }
    a.secondary { background:#ededed; color:#111; }
    .note { padding:0 18px 18px; font-size:13px; color:#777; line-height:1.5; }
    #viewerBox { display:none; height:78vh; min-height:560px; background:#f6f6f4; border-top:1px solid var(--line); }
    model-viewer { width:100%; height:100%; background:#f6f6f4; --poster-color:#f6f6f4; }
    .loading { padding:14px 18px; font-size:13px; color:#777; display:none; background:#fff; border-top:1px solid var(--line); }
    @media (max-width:640px) {
      h1 { font-size:22px; }
      .wrap { padding:14px 10px 24px; }
      #viewerBox { height:72vh; min-height:520px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>H90D 3D / AR Viewer V2</h1>
    <p>3D 모델은 버튼을 누른 뒤 불러옵니다. 아이폰에서는 Safari로 열면 AR 실행이 가장 안정적입니다.</p>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="action">
        <button class="primary" id="load3d">3D 모델 보기</button>
        <a class="button secondary" rel="ar" href="./H90D.usdz">iPhone AR 바로 열기</a>
      </div>

      <div class="note">
        카카오톡 내부 브라우저에서는 AR 버튼이 보이지 않거나 실행되지 않을 수 있습니다. 아이폰은 Safari, 안드로이드는 Chrome에서 확인하는 것을 권장합니다.
      </div>

      <div class="loading" id="loadingText">3D 모델을 불러오는 중입니다.</div>

      <div id="viewerBox">
        <model-viewer
          id="model"
          src=""
          ios-src="./H90D.usdz"
          ar
          ar-modes="webxr scene-viewer quick-look"
          camera-controls
          auto-rotate
          shadow-intensity="0.55"
          exposure="0.65"
          environment-image="neutral"
          interaction-prompt="auto"
          loading="lazy"
          reveal="auto">
          <button slot="ar-button" style="position:absolute;left:16px;right:16px;bottom:18px;width:auto;background:#111;color:white;border-radius:12px;padding:14px 16px;font-size:16px;font-weight:700;">AR로 보기</button>
        </model-viewer>
      </div>
    </section>
  </main>

  <script>
    const loadButton = document.getElementById('load3d');
    const viewerBox = document.getElementById('viewerBox');
    const model = document.getElementById('model');
    const loadingText = document.getElementById('loadingText');

    loadButton.addEventListener('click', () => {
      viewerBox.style.display = 'block';
      loadingText.style.display = 'block';
      loadButton.style.display = 'none';
      if (!model.getAttribute('src')) model.setAttribute('src', './H90D.glb');
      model.addEventListener('load', () => { loadingText.style.display = 'none'; }, { once: true });
    });
  </script>
</body>
</html>
